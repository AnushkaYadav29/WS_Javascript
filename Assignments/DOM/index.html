<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Card</title>

<style>
body {
  font-family: Arial;
  background: #eee;
}

.card {
  width: 350px;
  margin: 50px auto;
  border-radius: 10px;
  overflow: hidden;
  background: white;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.car-img {
  width: 100%;
  transition: 0.3s;
}

.card-body {
  padding: 20px;
  background: #4CAF50;
  color: white;
  transition: 0.3s;
}

.tag {
  background: red;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
}

.colors {
  margin: 10px 0;
}

.dot {
  height: 20px;
  width: 20px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 10px;
  cursor: pointer;
  border: 2px solid white;
}

.red { background: red; }
.gray { background: gray; }
.black { background: black; }

button {
  padding: 10px 15px;
  border: none;
  margin-top: 10px;
  color: white;
  background: red;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

button:hover {
  opacity: 0.8;
}
</style>

</head>
<body>

<div class="card">
  <img id="carImage" src="./assets/red.avif" class="car-img">

  <div class="card-body" id="cardBody">
    <span class="tag" id="tag">CAR</span>

    <h2>Mercedez Benz c300 2022</h2>

    <p>🚗 Mileage: 4,000 miles</p>
    <p>⛽ Fuel: 25mpg</p>
    <p>⭐ Safety: ★★★★★</p>

    <p>Pick a color:</p>

    <div class="colors">
      <span class="dot red" onclick="changeCar('red')"></span>
      <span class="dot gray" onclick="changeCar('gray')"></span>
      <span class="dot black" onclick="changeCar('black')"></span>
    </div>

    <h3>$134,450</h3>

    <button id="cartBtn">Add to Cart</button>
  </div>
</div>

<script>
function changeCar(color) {
  const img = document.getElementById("carImage");
  const tag = document.getElementById("tag");
  const btn = document.getElementById("cartBtn");

  const data = {
    red: {
      img: "red.avif",
      color: "red"
    },
    gray: {
      img: "blue.avif",
      color: "gray"
    },
    black: {
      img: "black.png",
      color: "black"
    }
  };

  img.src = data[color].img;
  tag.style.background = data[color].color;
  btn.style.background = data[color].color;
}
</script>

</body>
</html>
