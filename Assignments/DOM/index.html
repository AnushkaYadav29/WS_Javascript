<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Car UI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    background:#eee;
}


.card-box{
    width:320px;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}


.car-img{
    width:100%;
    height:200px;
    object-fit:cover;
}


.card-bottom{
    background:#4CAF50;
    color:white;
    padding:20px;
}

.tag{
    background:red;
    padding:4px 10px;
    border-radius:5px;
    font-size:12px;
}


.dot{
    height:18px;
    width:18px;
    border-radius:50%;
    display:inline-block;
    cursor:pointer;
    margin-right:8px;
}

.red{background:red;}
.gray{background:gray;}
.black{background:black;}

.active{
    border:2px solid white;
}


.cart-btn{
    border:none;
    padding:10px 15px;
    border-radius:5px;
    color:white;
    margin-top:10px;
    transition:0.3s;
}


.old{
    text-decoration:line-through;
    font-size:14px;
    opacity:0.7;
}
</style>

</head>

<body>

<div class="container mt-5">
<div class="row justify-content-center gap-4">


<div class="card-box">

<img id="img1" src="assets/red.avif" class="car-img">

<div class="card-bottom">

<span id="tag1" class="tag">CAR</span>

<h5 class="mt-2 fw-bold">Mercedez Benz c300 2022</h5>

<p><i class="fa fa-car"></i> Mileage: 4,000 miles</p>
<p><i class="fa fa-gas-pump"></i> Fuel: 25mpg</p>
<p><i class="fa fa-shield"></i> Safety: <i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star"style="color: yellow;"></i></p>

<p>Pick a color:</p>

<div>
<span class="dot red active" onclick="changeCar('red',1,this)"></span>
<span class="dot gray" onclick="changeCar('gray',1,this)"></span>
<span class="dot black" onclick="changeCar('black',1,this)"></span>
</div>

<h5 class="mt-2 fw-bold">$134,450 <span class="old">$140,500</span></h5>

<button id="btn1" class="cart-btn" style="background:#dc3545;">
<i class="fa fa-cart-shopping"></i> Add to Cart
</button>

</div>
</div>

<!-- CARD 2 -->
<div class="card-box">

<img id="img2" src="assets/black.avif" class="car-img">

<div class="card-bottom">

<span id="tag2" class="tag" style="background:black;">CAR</span>

<h5 class="mt-2 fw-bold">Mercedez Benz c300 2022</h5>

<p><i class="fa fa-car"></i> Mileage: 4,000 miles</p>
<p><i class="fa fa-gas-pump"></i> Fuel: 25mpg</p>
<p><i class="fa fa-shield"></i> Safety: <i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star" style="color: yellow;"></i><i class="fa-solid fa-star"style="color: yellow;"></i></p>

<p>Pick a color:</p>

<div>
<span class="dot red" onclick="changeCar('red',2,this)"></span>
<span class="dot gray" onclick="changeCar('gray',2,this)"></span>
<span class="dot black active" onclick="changeCar('black',2,this)"></span>
</div>

<h5 class="mt-2 fw-bold">$134,450 <span class="old">$140,500</span></h5>


<button id="btn2" class="cart-btn" style="background:#000;">
<i class="fa fa-cart-shopping"></i> Add to Cart
</button>

</div>
</div>

</div>
</div>

<script>
function changeCar(color, cardNo, el){

    let img = document.getElementById("img"+cardNo);
    let btn = document.getElementById("btn"+cardNo);
    let tag = document.getElementById("tag"+cardNo);

    const data = {
        red:{
            img:"assets/red.avif",
            color:"#dc3545"
        },
        gray:{
            img:"assets/gray.avif",
            color:"#6c757d"
        },
        black:{
            img:"assets/black.avif",
            color:"#000000"
        }
    };

  
    img.src = data[color].img;

   
    btn.style.backgroundColor = data[color].color;

    
    tag.style.backgroundColor = data[color].color;

   
    let dots = el.parentElement.children;
    for(let i=0;i<dots.length;i++){
        dots[i].classList.remove("active");
    }
    el.classList.add("active");
}
</script>

</body>
</html>
