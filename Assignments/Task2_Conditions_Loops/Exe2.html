<body>
    <script>
        let num=Number(prompt("Enter the number : "))
        for(i=1;i<=10;i++){
        let multiple=num*i;
        document.writeln(num +"*" +i+ "=" +multiple+ "<br>");     
        }       
    </script>
</body>
