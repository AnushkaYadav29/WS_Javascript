<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse a number</title>
</head>
<body>
    <script>
    let num=prompt("Enter a number : ")
    let reversed="";
    let i=num.length-1
    while(i>=0){
        reversed+=num[i];
        i--;
    }
    document.write("Reversed number is : "+reversed)
    </script>
</body>
</html>
