<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Odd and Even Number</title>
</head>
<body>
    <script>
        let sumOfEven=0;
        let sumOfOdd=0;
        for(i=1;i<=100;i++){
            if(i%2==0){
                sumOfEven+=i;               
            }
        }
        document.write("The Sum of Even numbers: "+sumOfEven +"<br>")

        for(i=1;i<=100;i++){
            if(i%2!=0){
                sumOfOdd+=i;               
            }
        }
        document.write("The Sum of Odd numbers : "+sumOfOdd)

    </script>
</body>
</html>
