<!DOCTYPE html>
<html>
<body>

<p id="output"></p>

<script>

function printTriangle(n){

let result="";

for(let i=1;i<=n;i++){

    for(let j=1;j<=i;j++){
        result += "* ";
    }

    result += "\n";
}

document.getElementById("output").innerText = result;

}

printTriangle(5);

</script>

</body>
</html>
