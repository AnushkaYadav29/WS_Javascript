<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial</title>
</head>
<body>
    <script>
        let num=Number(prompt("Enter the number : "))
        let fact=1;
        let i=num;
        while(i>=1){
             fact*=i
             i--;
        }
        document.write("Factorial of "+num+" : "+fact)
    </script>
</body>
</html>
