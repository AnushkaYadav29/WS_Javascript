<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Array Assignments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    
    <div class="container w-75 rounded m-5 p-3" style="background-color: rgb(189, 184, 184);height: 300px;">
        <h2>Assignment 1 . To Do List Manager</h2>
        <div class="container">
            <input type="text" id="inputAss1">
            <button class="btn btn-primary" onclick="addToDo()" >Add Task</button>
            <button class="btn btn-primary" onclick="clearAllToDo()" >Clear All</button>

        </div>
        <div class="container" id="resultToDo"></div>

    
    </div>

    <script>
        toDos=[]

        function renderToDos(){
             document.querySelector('#resultToDo').innerHTML=toDos.map((task)=>`
                        <div class="mb-1">
                            <b class="text-primary pe-5">${task}</b>
                            <button class='btn btn-danger'onclick='deleteTask(${index})'>DELETE</button>
                        </div>
            `).join('')    
        }


        function addToDo(){
            inputToDoEle=document.querySelector('#inputAss1')
            newToDo=inputToDoEle.value
            toDos.push(newToDo)
            renderToDos()
            console.log(inputToDoEle.value)
            inputToDoEle.value=''
            console.log(inputToDoEle.value)
        }

        function clearAllToDo(){
            toDos=[]
            renderToDos()
        }

        function deleteTask(i){
            toDos.splice(i,1)
            renderToDos()
        }


    </script>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
