<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ass7</title>
</head>
<body>
    <p id="result"></p>

    <script>
        let age=Number(prompt("Enter age"))
        let citizen=prompt("Are you a citizen ? (true/false)")==="true";

        let eligible=(age>=18) && citizen;

        document.getElementById("result").innerHTML="Eligible to vote : "+eligible;
    </script>
</body>
</html>
