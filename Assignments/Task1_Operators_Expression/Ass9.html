<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ass9</title>
</head>
<body>
    <p id="EvenOdd"></p>

    <script>
        let num=Number(prompt("Enter a number"));
        let EvenOdd="";

        if(num%2==0){
            EvenOdd="Even"
        }else{
            EvenOdd="Odd"
        }

        document.getElementById("EvenOdd").innerHTML="The Number is "+EvenOdd;

    </script>
</body>
</html>
