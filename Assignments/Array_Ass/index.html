    <div

    <!-- Assignment 1 -->
      <h2>Assignment 1 . To Do List Manager</h2>
      <div class="container">
        <input type="text" id="inputAss1" />
        <button class="btn btn-primary" onclick="addToDo()">Add Task</button>
        <button class="btn btn-primary" onclick="clearAllToDo()">
          Clear All
        </button>
      </div>
      <div class="container" id="resultToDo"></div>
    </div>

    <script>
      toDos = [];

      function renderToDos() {
        document.querySelector("#resultToDo").innerHTML = toDos
          .map(
            (task) => `
                        <div class="mb-1">
                            <b class="text-primary pe-5">${task}</b>
                            <button class='btn btn-danger'onclick='deleteTask(${index})'>DELETE</button>
                        </div>
            `,
          )
          .join("");
      }

      function addToDo() {
        inputToDoEle = document.querySelector("#inputAss1");
        newToDo = inputToDoEle.value;
        toDos.push(newToDo);
        renderToDos();
        console.log(inputToDoEle.value);
        inputToDoEle.value = "";
        console.log(inputToDoEle.value);
      }

      function clearAllToDo() {
        toDos = [];
        renderToDos();
      }

      function deleteTask(i) {
        toDos.splice(i, 1);
        renderToDos();
      }
    </script>






    <!-- Assignment 2 -->

    <section>
      <div
        class="container w-75 rounded m-5 p-3"
        style="background-color: rgb(189, 184, 184); height: 300px"
      >
        <h2>Assignment 2 . Students Marks Calculator</h2>
        <div class="container">
          <input type="text" id="inputAssMarks" />
          <button class="btn btn-primary" onclick="addMarks()">
            Add Marks
          </button>
          <button class="btn btn-primary" onclick="calculate()">
            Calculate
          </button>
          <button class="btn btn-primary" onclick="reset()">Reset</button>
        </div>
        <div class="container" id="resultArray"></div>
      </div>
    </section>

    <script>
      marksArray = [];

      function addMarks() {
        inputAssgnMarksELMT = document.querySelector("#inputAssMarks");
        inputMarks = inputAssgnMarksELMT.value;
        inMArks = parseInt(inputMarks);
        marksArray.push(inMArks);
        inputAssgnMarksELMT.value = "";
        console.log(marksArray);
      }

      function calculate() {
        let total = 0;
        let highestMarks = 0;
        let lowestmarks = Infinity;

        for (i = 0; i < marksArray.length; i++) {
          total += marksArray[i];

          if (marksArray[i] > highestMarks) {
            highestMarks = marksArray[i];
          }

          if (marksArray[i] < lowestmarks) {
            lowestmarks = marksArray[i];
          }
        }

        let average = total / marksArray.length;

        document.querySelector("#resultArray").innerHTML = `
            <p><b>Total marks :</b> ${total}</p>
            <p><b>Average :</b> ${average}</p>
            <p><b>Highest marks :</b> ${highestMarks}</p>
            <p><b>Lowest marks :</b> ${lowestmarks}</p>

        `;
      }

      function reset() {
        marksArray = [];

        document.querySelector("#resultToDo").innerHTML = "";

        document.querySelector("#inputAssMarks").value = "";
        console.log(marksArray);
      }
    </script>







    <!-- Assignment 3 -->

    <section>
      <div
        class="container w-75 rounded m-5 p-3"
        style="background-color: rgb(189, 184, 184); height: 300px"
      >
        <h2>Assignment 3 . Search</h2>
        <div class="container">
          <p>Guess the ingredient of Paneer Tikka Masala</p>
          <input type="text" id="inputFood" />
          <button class="btn btn-primary" onclick="searchFood()">Search</button>
        </div>
        <div class="container" id="resultFood"></div>
      </div>
    </section>

    <script>
      FoodArray = [
        "Paneer",
        "Paneer Masala",
        "Tomato",
        "Capsicum",
        "Onion",
        "Curd",
        "Ginger-garlic",
      ];
      function searchFood() {
        inputFoodElmt = document.querySelector("#inputFood");
        ingredient = inputFoodElmt.value;

        for (i = 0; i < FoodArray.length; i++) {
          if (FoodArray[i].toLowerCase() == ingredient.toLowerCase()) {
            document.querySelector("#resultFood").innerHTML = FoodArray[i];
            break;
          } else {
            document.querySelector("#resultFood").innerHTML = "Not found";
          }
        }
      }
    </script>

    <section>
      <div class="container w-75 rounded m-5 p-3 bg-secondary-subtle">
        <h2>Assignment 4 - Filter Even and Odd</h2>

        </div>

        <div class="container border p-2 mb-3" id="resultEven"></div>

        <h5></h5>
        <div class="container border p-2" id="resultOdd"></div>

    </section>

    <script>

        //   }
        // }

        result=EvenOdd.filter(number=>(number%2==0))

        //   if (EvenOdd[i] % 2 != 0) {
        //     result += EvenOdd[i] + " , ";

<!-- Assignment 5 -->
 <section>
      <div class="container w-75 rounded m-5 p-3 bg-secondary-subtle">
        <h2>Assignment 5 - Sort names Alphabetically</h2>

        <div class="mb-3">
          <input type="text" id="inputNames" placeholder="Enter a name" />

          <button class="btn btn-primary" onclick="addName()">
            Add Name
          </button>
          <button class="btn btn-primary" onclick="sortNames()">
            Sort
          </button>
          <button class="btn btn-primary" onclick="resetNames()">Reset</button>

        <div class="container" id="SortArray"></div>


        </div>

        
      </div>
    </section>

    <script>
    namesArr = []

    function addName(){
        let inputNamesEle = document.querySelector('#inputNames')
        let inNames = inputNamesEle.value
        namesArr.push(inNames)
        inputNamesEle.value=""
        console.log(namesArr)
    }

    function sortNames(){
        let sortedNames = namesArr.sort(function(a,b){
            return a.toLowerCase().localeCompare(b.toLowerCase());
        })

        document.querySelector('#SortArray').innerHTML = sortedNames;
    }

    function resetNames(){
        namesArr=[]
        document.querySelector('#SortArray').innerHTML=""
        document.querySelector('#inputNames').value=""
    }
</script>
