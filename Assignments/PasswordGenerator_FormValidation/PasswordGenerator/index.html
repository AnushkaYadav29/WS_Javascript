<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
        <div class="box h-100 w-100 bg-light m-3 p-5">
    <h1 class="heading text-center">Password Generator</h1>
    <div class="mb-3">
            <label for="length" class="form-label">Password Length:</label>
            <input type="number" id="length" class="form-control w-25" max="20" value="8">
    </div>

     <div class="form-check">
            <input class="form-check-input" type="checkbox" id="includeNumbers">
            <label class="form-check-label" for="includeNumbers">Include Numbers</label>
    </div>

    <div class="form-check">
            <input class="form-check-input" type="checkbox" id="includeUppercase">
            <label class="form-check-label" for="includeUppercase">Include Uppercase</label>
    </div>

    <div class="form-check">
            <input class="form-check-input" type="checkbox" id="includeSpecialChar">
            <label class="form-check-label" for="includeSpecialChar">Include Special Characters</label>
    </div>

    <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="excludeAmbigiousChar">
            <label class="form-check-label" for="excludeAmbigiousChar">Excludes ambigious characters</label>
    </div>

    <div class="btn-gen">
        <button class="btn btn-primary mb-2" onclick="GeneratePassword()">Generate Password</button>
    </div>
 
  <div class="mt-3">
            <label class="form-label">Generated Password:</label>
            <input type="password" class="form-control" id="result" readonly>
            <div class="form-check mt-2">
  <input class="form-check-input" type="checkbox" id="togglePassword" onclick="togglePasswordVisibility()">
  <label class="form-check-label">Show Password</label>
</div>
        </div>
        <div class="progress mt-3">
            <div class="progress-bar" id="strengthBar" role="progressbar"></div>
        </div>
        <p id="strengthText" class="mt-1 fw-bold"></p>
        <button class="btn btn-outline-secondary mt-2" onclick="copyPassword()">Copy</button>

    </div>
    
        </div>
    </div>

    <script>

function GeneratePassword(){

        let length=document.getElementById('length').value
        let includeNumbersElmt=document.getElementById('includeNumbers').checked
        let includeUppercaseElmt=document.getElementById('includeUppercase').checked
        let includeSpecialcharElmt=document.getElementById('includeSpecialChar').checked
        

        let charset="abcdefghijklmnopqrstuvwxyz"
        if(includeNumbersElmt)charset+="0123456789"
        if(includeUppercaseElmt)charset+="ABCDEFGHIJKLMNOPQRSTUVWXYZ"
        if(includeSpecialcharElmt)charset+="!@#$%^&*_+-{[]}"
        if(document.getElementById("excludeAmbigiousChar").checked){
        charset=charset.replace(/[1l0oI]/g,"")
        }

        let password=""
        for(i=0;i<length;i++){
            password+=charset.charAt(Math.floor(Math.random()*charset.length))
        }

        document.getElementById("result").value=password

        evaluateStrength(password)
        }

        function togglePasswordVisibility(){
            let input=document.getElementById("result")
            if(input.type==="password"){
                input.type="text"
            }else{
                input.type="password"
            }
        }


        function evaluateStrength(password) {
  const strengthBar = document.getElementById("strengthBar");
  const strengthText = document.getElementById("strengthText");
  let strength = 0;

  if (password.length >= 8) strength++;
  if (/[A-Z]/.test(password)) strength++;
  if (/[0-9]/.test(password)) strength++;
  if (/[^A-Za-z0-9]/.test(password)) strength++;

  let width = strength * 25;
  strengthBar.style.width = width + "%";

  if (strength === 0) {
    strengthText.textContent = "";
    strengthBar.className = "progress-bar";
  } else if (strength === 1) {
    strengthText.textContent = "Weak";
    strengthBar.className = "progress-bar bg-danger";
  } else if (strength === 2) {
    strengthText.textContent = "Medium";
    strengthBar.className = "progress-bar bg-warning";
  } else if (strength === 3) {
    strengthText.textContent = "Strong";
    strengthBar.className = "progress-bar bg-info";
  } else {
    strengthText.textContent = "Very Strong";
    strengthBar.className = "progress-bar bg-success";
  }
}

function copyPassword(){
    let password = document.getElementById("result").value;
    navigator.clipboard.writeText(password);
}
        


    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
