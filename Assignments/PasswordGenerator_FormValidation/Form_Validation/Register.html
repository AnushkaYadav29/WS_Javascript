<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
}

.card-box{
    background: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

button:hover{
    transform: scale(1.05);
    transition: 0.3s;
}

.error{
    color: red;
    display: none;
}

</style>
</head>

<body>

<div class="container h-100 d-flex align-items-center">
    <div class="row w-100">

        <!-- LEFT IMAGE -->
        <div class="col-md-6 d-none d-md-flex justify-content-center align-items-center">
            <img src="./assets/Register_Login.avif" class="img-fluid" style="max-height:400px;">
        </div>

        <!-- FORM -->
        <div class="col-md-6">
            <div class="card-box">

                <h3 class="text-center mb-4">Register</h3>

                <div class="mb-3">
                    <label>User Name</label>
                    <input type="text" class="form-control" id="username">
                    <div class="error" id="errUser">Invalid Username</div>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" id="email">
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" class="form-control" id="password">
                </div>

                <div class="mb-3">
                    <label>Repeat Password</label>
                    <input type="password" class="form-control" id="repassword">
                </div>

                <button class="btn btn-primary w-100" onclick="register()">Register</button>

                <p class="text-center mt-3">
                    Already have account? <a href="login.html">Login</a>
                </p>

            </div>
        </div>

    </div>
</div>

<script>

function register(){

    let username = document.getElementById("username").value.trim()
    let email = document.getElementById("email").value.trim()
    let password = document.getElementById("password").value.trim()
    let repassword = document.getElementById("repassword").value.trim()

    if(username.length < 6){
        document.getElementById("errUser").style.display="block"
        return
    }

    if(password !== repassword){
        alert("Passwords do not match")
        return
    }

    let user = {
        username: username,
        email: email,
        password: password
    }

    localStorage.setItem("user", JSON.stringify(user))

    alert("Registered Successfully")
    window.location.href="login.html"
}

</script>

</body>
</html>
